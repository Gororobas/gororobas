services:
  gel:
    image: geldata/gel
    environment:
      GEL_SERVER_SECURITY: insecure_dev_mode
      GEL_SERVER_PASSWORD: ${GEL_PASSWORD}
      GEL_SERVER_ADMIN_UI: enabled
    volumes:
      - gel-data:/var/lib/gel/data
      - ./dbschema:/dbschema
    networks:
      - internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gel-auth.rule=Host(`${GEL_AUTH_DOMAIN:-api.gororobas.com}`)"
      - "traefik.http.routers.gel-auth.entrypoints=websecure"
      - "traefik.http.routers.gel-auth.tls.certResolver=letsencrypt"
      - "traefik.http.routers.gel-auth.service=gel-auth"
      - "traefik.http.services.gel-auth.loadbalancer.server.port=5656"
      - "traefik.http.services.gel-auth.loadbalancer.server.scheme=https"
      - "traefik.http.services.gel-auth.loadbalancer.serversTransport=gel-auth-transport"
      - "traefik.http.serversTransports.gel-auth-transport.insecureSkipVerify=true"
    healthcheck:
      test: ["CMD-SHELL", "echo 'OK' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID}
        NEXT_PUBLIC_SANITY_DATASET: ${NEXT_PUBLIC_SANITY_DATASET}
        SANITY_WRITE_TOKEN: ${SANITY_WRITE_TOKEN}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_SECRET: ${GOOGLE_SECRET}
        MAILPIT_URL: ${MAILPIT_URL}
        RESEND_API_KEY: ${RESEND_API_KEY}
        AUTH_WEBHOOK_SECRET: ${AUTH_WEBHOOK_SECRET}
        GOOGLE_DATA_API_KEY: ${GOOGLE_DATA_API_KEY}
        HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY}
        HONEYCOMB_DATASET: ${HONEYCOMB_DATASET}
        BLUESKY_USERNAME: ${BLUESKY_USERNAME}
        BLUESKY_PASSWORD: ${BLUESKY_PASSWORD}
        VERCEL_DASHBOARD_URL: ${VERCEL_DASHBOARD_URL}
        GEL_PASSWORD: ${GEL_PASSWORD}
    environment:
      GEL_DSN: gel://edgedb:${GEL_PASSWORD}@gel:5656/main
      GEL_TLS_SECURITY: insecure
      NODE_ENV: production
    depends_on:
      gel:
        condition: service_healthy
    networks:
      - internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs.rule=Host(`${APP_DOMAIN:-gororobas.com}`) || Host(`${APP_WWW_DOMAIN:-www.gororobas.com}`)"
      - "traefik.http.routers.nextjs.entrypoints=websecure"
      - "traefik.http.routers.nextjs.tls.certResolver=letsencrypt"
      - "traefik.http.services.nextjs.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "echo 'OK' || exit 1"]
      interval: 30s
      timeout: 35s
      retries: 5
      start_period: 60s # Give Gel time to initialize

volumes:
  gel-data:

networks:
  internal:
  dokploy-network:
    external: true
