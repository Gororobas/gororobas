pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*"
      run: bun run lint --quiet {staged_files}
      stage_fixed: true
    oxfmt:
      glob: "*"
      run: bun oxfmt {staged_files}
      stage_fixed: true
    beads-export:
      run: bd export -o .beads/issues.jsonl && git add .beads/issues.jsonl
