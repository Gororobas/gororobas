pre-commit:
  parallel: false
  commands:
    oxfmt:
      glob: "*"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*"
      run: pnpm run lint --quiet {staged_files}
      stage_fixed: true
    type-check:
      run: pnpm run type-check
    test:
      run: pnpm run test -- --run
