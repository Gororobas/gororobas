pre-commit:
  parallel: false
  commands:
    oxfmt:
      glob: "*.{ts,tsx,css}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*.{ts,tsx,css}"
      run: pnpm run lint --quiet {staged_files}
      stage_fixed: true
    type-check:
      glob: "*.{ts,tsx}"
      run: pnpm run type-check
    test:
      glob: "*.{ts,tsx,feature}"
      run: pnpm run test -- --run
